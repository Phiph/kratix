---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kratix-event-forwarder
  namespace: kratix-platform-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kratix-event-forwarder
rules:
  # Watch Events cluster-wide. Events are the wire-format input.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # Read CloudEventSink CRs to learn where to deliver.
  - apiGroups: ["eventing.kratix.io"]
    resources: ["cloudeventsinks"]
    verbs: ["get", "list", "watch"]
  # v0.1: status writes deferred. When implemented, uncomment:
  # - apiGroups: ["eventing.kratix.io"]
  #   resources: ["cloudeventsinks/status"]
  #   verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kratix-event-forwarder
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kratix-event-forwarder
subjects:
  - kind: ServiceAccount
    name: kratix-event-forwarder
    namespace: kratix-platform-system
