---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kratix-event-forwarder
  namespace: kratix-platform-system
  labels:
    app.kubernetes.io/name: kratix-event-forwarder
    app.kubernetes.io/component: eventing
spec:
  # v0.1: single replica. No leader election yet — the forwarder is stateless
  # and idempotent at the consumer side (dedupe on kratixcorrelationid), so
  # adding replicas later means duplicate deliveries, not correctness issues.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kratix-event-forwarder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kratix-event-forwarder
        app.kubernetes.io/component: eventing
    spec:
      serviceAccountName: kratix-event-forwarder
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: forwarder
          image: ghcr.io/syntasso/kratix-event-forwarder:dev
          imagePullPolicy: IfNotPresent
          args:
            - --install-id=$(INSTALL_ID)
            - --log-level=info
          env:
            - name: INSTALL_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
