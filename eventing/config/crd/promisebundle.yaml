---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: promisebundles.eventing.kratix.io
spec:
  group: eventing.kratix.io
  names:
    kind: PromiseBundle
    listKind: PromiseBundleList
    plural: promisebundles
    shortNames:
    - pbun
    singular: promisebundle
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.promiseRef.name
      name: Promise
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PromiseBundle declares the companion resources that ship alongside a
          Promise — agents, signal taxonomies, configs, supporting Deployments.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PromiseBundleSpec declares the resources that ship alongside a Promise.

              Where a Promise's `spec` is the platform contract (the CRD the producer
              promises to fulfil), a PromiseBundle is the producer's manifest of
              *companions*: the agents, configs, and supporting resources the Promise
              brings with it.

              The bundle controller applies these resources when the referenced
              Promise becomes Available. The Promise's `dependencies:` field is for
              other Promises; this is for everything else.
            properties:
              companions:
                description: |-
                  Companions is the ordered list of resources to apply once the
                  Promise reaches Available. Apply order is preserved so producers
                  can stage dependencies (e.g. ConfigMap before Deployment).
                items:
                  description: |-
                    Companion is one resource the bundle ships. Exactly one of `inline` or
                    `ref` MUST be set. The bundle controller enforces this at apply time
                    (decodeCompanion rejects mismatched companions with a non-Applied
                    status). CEL-level enforcement isn't viable here because `inline` is
                    schemaless (preserve-unknown-fields), which CEL cannot reason about.
                  properties:
                    inline:
                      description: |-
                        Inline carries the resource manifest verbatim. The bundle
                        controller decodes it as unstructured.Unstructured at apply time;
                        the producer is responsible for the manifest's correctness.
                      x-kubernetes-preserve-unknown-fields: true
                    name:
                      description: |-
                        Name is a stable identifier for this companion within the bundle.
                        Used in status reporting and to provide deterministic ordering.
                      minLength: 1
                      type: string
                    ref:
                      description: |-
                        Ref refers to a resource the controller should fetch and apply.
                        v0.1 supports a single shape: an in-cluster ConfigMap holding the
                        manifest as YAML. Future revisions may add HTTP/git references.
                      properties:
                        configMap:
                          description: |-
                            ConfigMap is the reference shape. The named ConfigMap's `.data[key]`
                            is parsed as a YAML document.
                          properties:
                            key:
                              description: Key within the ConfigMap's `data` map.
                              type: string
                            name:
                              description: Name of the ConfigMap.
                              type: string
                            namespace:
                              description: Namespace of the ConfigMap.
                              type: string
                          required:
                          - key
                          - name
                          - namespace
                          type: object
                      required:
                      - configMap
                      type: object
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              promiseRef:
                description: PromiseRef names the Promise this bundle ships alongside.
                properties:
                  name:
                    description: Name of the Promise (cluster-scoped).
                    type: string
                required:
                - name
                type: object
            required:
            - companions
            - promiseRef
            type: object
          status:
            description: PromiseBundleStatus reports observed state.
            properties:
              companions:
                description: |-
                  Companions is one entry per spec.companions entry, in the same
                  order. Each carries the most recent apply outcome.
                items:
                  description: CompanionStatus is per-companion observed state.
                  properties:
                    apiVersion:
                      description: |-
                        Kind/APIVersion/Namespace/ResourceName describe the applied
                        object. Filled in once we successfully decode the manifest, even
                        if the apply itself failed.
                      type: string
                    kind:
                      type: string
                    lastAppliedAt:
                      description: |-
                        LastAppliedAt is when the controller last successfully applied
                        this companion.
                      format: date-time
                      type: string
                    message:
                      description: Message is human-readable detail (failure cause,
                        etc.).
                      type: string
                    name:
                      description: Name mirrors Companion.Name; correlates by ordinal+name.
                      type: string
                    namespace:
                      type: string
                    resourceName:
                      type: string
                    result:
                      description: Result is the most recent apply outcome.
                      enum:
                      - applied
                      - failed
                      - pending
                      type: string
                  required:
                  - name
                  - result
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              conditions:
                description: |-
                  Conditions standard set:
                    Ready  — true when the Promise is Available and every companion
                             applied successfully on the most recent reconcile.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the spec generation last reconciled.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
