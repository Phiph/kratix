# Sample Resource Request for the ScheduledJob Promise.
#
# Submit this after the Promise is installed; Kratix runs the configure
# pipeline (in samples/reference-promise/pipeline) which materialises a
# CronJob and an audit ConfigMap.
#
# This example uses busybox so the smoke test runs anywhere. To make the
# job fail on purpose (so the pause-flaking-job agent has something to
# propose), set spec.image to a non-existent reference or spec.command to
# something that exits non-zero — `exit 1` works.
apiVersion: platform.kratix.io/v1alpha1
kind: ScheduledJob
metadata:
  name: nightly-cleanup
  namespace: team-a
spec:
  # Every minute is a smoke-test cadence. Real workloads should be slower.
  schedule: "*/1 * * * *"
  image: busybox:1.36
  command: ["/bin/sh", "-c"]
  args:
    - |
      echo "running cleanup at $(date)"
      # Uncomment to simulate failures for the pause-flaking-job agent:
      # exit 1
  timeoutSeconds: 60
  maxRetries: 1
  suspended: false
