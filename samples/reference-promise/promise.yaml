# Reference Promise: ScheduledJob.
#
# The platform contract: "request a ScheduledJob, get a managed CronJob with
# retry policy, audit trail, default observability, and a gated remediation
# agent for flaking schedules." Operators install the Promise; consumers
# submit ScheduledJob Resource Requests.
#
# This file is the producer's API surface. Everything else in the bundle
# (pipeline, job-watcher, signals, agents) is implementation detail.
apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: scheduled-job
  namespace: default
spec:
  destinationSelectors:
    - matchLabels:
        environment: platform
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: scheduledjobs.platform.kratix.io
    spec:
      group: platform.kratix.io
      names:
        kind: ScheduledJob
        plural: scheduledjobs
        singular: scheduledjob
        shortNames:
          - sj
      scope: Namespaced
      versions:
        - name: v1alpha1
          served: true
          storage: true
          schema:
            openAPIV3Schema:
              type: object
              properties:
                spec:
                  type: object
                  required: [schedule, image]
                  properties:
                    schedule:
                      type: string
                      description: >-
                        Standard cron expression (5 fields). The platform
                        does not enforce a minimum interval; producers may
                        set one downstream.
                      example: "*/15 * * * *"
                    image:
                      type: string
                      description: Container image to run on each tick.
                    command:
                      type: array
                      items:
                        type: string
                    args:
                      type: array
                      items:
                        type: string
                    timeoutSeconds:
                      type: integer
                      default: 600
                      description: Job activeDeadlineSeconds. 0 = no deadline.
                    maxRetries:
                      type: integer
                      default: 2
                      description: backoffLimit on the underlying Job.
                    suspended:
                      type: boolean
                      default: false
                      description: >-
                        If true, the CronJob is created with suspend=true.
                        Used by the pause-flaking-job agent to halt a
                        misbehaving schedule.
                status:
                  type: object
                  properties:
                    ready:
                      type: boolean
                    lastConfiguredAt:
                      type: string
                      format: date-time
  workflows:
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: configure
          spec:
            containers:
              - name: configure
                image: ghcr.io/syntasso/reference-scheduled-job-pipeline:v0.1
